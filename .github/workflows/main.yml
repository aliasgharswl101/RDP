name: Windows-RDP-Tailscale

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:

    - name: Enable RDP
      shell: pwsh
      run: |
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0

        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

        Restart-Service TermService -Force

    - name: Create RDP User
      shell: pwsh
      run: |

        $username = "RDP"

        if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name $username
        }

        $chars = 33..126
        $password = -join ($chars | Get-Random -Count 16 | ForEach-Object { [char]$_ })

        $secure = ConvertTo-SecureString $password -AsPlainText -Force

        New-LocalUser `
            -Name $username `
            -Password $secure `
            -AccountNeverExpires

        Add-LocalGroupMember -Group "Administrators" -Member $username
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username

        "RDP_USER=$username" >> $env:GITHUB_ENV
        "RDP_PASS=$password" >> $env:GITHUB_ENV

    - name: Install Tailscale
      shell: pwsh
      run: |

        $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
        $msi = "$env:TEMP\tailscale.msi"

        Invoke-WebRequest $url -OutFile $msi

        Start-Process msiexec.exe `
            -ArgumentList "/i `"$msi`" /quiet /norestart" `
            -Wait

    - name: Connect Tailscale
      shell: pwsh
      run: |

        $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

        & $ts up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-rdp-${{ github.run_id }}"

        Start-Sleep 10

        $ip = (& $ts ip -4)[0]

        if (!$ip) {
            throw "Failed to obtain Tailscale IP."
        }

        "TS_IP=$ip" >> $env:GITHUB_ENV

    - name: Verify RDP
      shell: pwsh
      run: |

        $result = Test-NetConnection -ComputerName $env:TS_IP -Port 3389

        if (!$result.TcpTestSucceeded) {
            throw "RDP Port 3389 is closed."
        }

        Write-Host "RDP Port Open."

    - name: Connection Details
      shell: pwsh
      run: |

        @"
# Windows RDP Ready

## Connection

**IP**
$env:TS_IP

**Username**
$env:RDP_USER

**Password**
$env:RDP_PASS

"@ >> $env:GITHUB_STEP_SUMMARY

        Write-Host "================================="
        Write-Host "Windows RDP Ready"
        Write-Host "================================="
        Write-Host "IP       : $env:TS_IP"
        Write-Host "Username : $env:RDP_USER"
        Write-Host "Password : $env:RDP_PASS"
        Write-Host "================================="

    - name: Keep Alive
      shell: pwsh
      run: |

        while ($true) {
            Write-Host "[KEEP-ALIVE] $(Get-Date)"
            Start-Sleep -Seconds 300
        }
